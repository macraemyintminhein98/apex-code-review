<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Code Review</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/milligram/1.4.1/milligram.min.css">
    <style>
        body { margin-top: 2rem; }
        .container { max-width: 800px; }
        form { margin-top: 2rem; padding: 2rem; border: 1px solid #eee; border-radius: 4px; }
        #review-output { margin-top: 2rem; padding: 1rem; background-color: #f9f9f9; border: 1px solid #ddd; border-radius: 4px; white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Apex Code Review</h1>
        <p>AI-powered code analysis for GitHub repositories.</p>

        <form id="review-form">
            <fieldset>
                <label for="github_url">GitHub Repository URL</label>
                <input type="url" id="github_url" name="github_url" placeholder="e.g., https://github.com/owner/repo" required>
                <input class="button-primary" type="submit" value="Get Code Review">
            </fieldset>
        </form>

        <div id="review-output"></div>
    </div>

    <script>
        document.getElementById('review-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const githubUrl = document.getElementById('github_url').value;
            const outputDiv = document.getElementById('review-output');
            outputDiv.innerHTML = 'Analyzing code... please wait.';

            try {
                const response = await fetch('/api/review', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ github_url: githubUrl })
                });
                const data = await response.json();

                if (response.ok) {
                    outputDiv.innerHTML = data.review_report;
                } else {
                    outputDiv.innerHTML = `Error: ${data.message || 'Something went wrong.'}`;
                }
            } catch (error) {
                outputDiv.innerHTML = `An unexpected error occurred: ${error.message}`;
            }
        });
    </script>
</body>
</html>
